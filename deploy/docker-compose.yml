services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: claril
      POSTGRES_PASSWORD: claril
      POSTGRES_DB: claril
    ports:
      - "5432:5432"
    volumes:
      - claril_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claril -d claril"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  claril_pg:
